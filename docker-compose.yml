services:
  clipr:
    build: .
    container_name: clipr
    ports:
      - "3000:3000"
    volumes:
      - clipr-data:/data
      - .:/repo
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - NODE_ENV=production
      - DATA_DIR=/data
      - OLLAMA_HOST=ollama
      - OLLAMA_PORT=11434
      - JWT_SECRET=clipr-dev-secret-change-in-production
    depends_on:
      ollama:
        condition: service_healthy
    restart: always

  ollama:
    image: ollama/ollama
    container_name: clipr-ollama
    volumes:
      - ollama-data:/root/.ollama
    # GPU: décommenter pour NVIDIA (nécessite nvidia-container-toolkit)
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: always

  caddy:
    image: caddy:2-alpine
    container_name: clipr-caddy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile
      - caddy-data:/data
      - caddy-config:/config
    restart: always

volumes:
  clipr-data:
  ollama-data:
  caddy-data:
  caddy-config:

services:
  clipr:
    build: .
    container_name: clipr
    ports:
      - "3000:3000"
    volumes:
      - clipr-data:/data
      - .:/repo
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - NODE_ENV=production
      - DATA_DIR=/data
      - OLLAMA_HOST=ollama
      - OLLAMA_PORT=11434
      - JWT_SECRET=${JWT_SECRET}
      - HF_TOKEN=${HF_TOKEN}
      # ─── Validation des inscriptions par email (SMTP temonia.fr:465 SSL) ───
      - SMTP_HOST=${SMTP_HOST:-temonia.fr}
      - SMTP_PORT=${SMTP_PORT:-465}
      - SMTP_SECURE=${SMTP_SECURE:-true}
      - SMTP_USER=${SMTP_USER:-clipr@temonia.fr}
      - SMTP_PASS=${SMTP_PASS}
      - SMTP_FROM=${SMTP_FROM:-clipr@temonia.fr}
      - ADMIN_EMAIL=${ADMIN_EMAIL:-clipr@temonia.fr}
      - PUBLIC_URL=${PUBLIC_URL:-https://clipr-temonia.flavienauvray.me}
    deploy:
      resources:
        reservations:
          devices:
            - capabilities: [gpu]
    depends_on:
      ollama:
        condition: service_healthy
    restart: always

  ollama:
    image: ollama/ollama
    container_name: clipr-ollama
    volumes:
      - ollama-data:/root/.ollama
    deploy:
      resources:
        reservations:
          devices:
            - capabilities: [gpu]
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: always

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: clipr-tunnel
    command: tunnel --no-autoupdate --protocol http2 run --token ${CLOUDFLARE_TUNNEL_TOKEN}
    restart: always
    depends_on:
      - clipr

  # Caddy : reverse proxy HTTPS pour exposer Clipr directement via clipr.temonia.fr
  # Auto Let's Encrypt (HTTP-01 challenge sur port 80), WebSocket transparent.
  # Necessite port forwarding 80/443 du routeur vers cette machine.
  caddy:
    image: caddy:latest
    container_name: clipr-caddy
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      - clipr

volumes:
  clipr-data:
  ollama-data:
  caddy-data:
  caddy-config:

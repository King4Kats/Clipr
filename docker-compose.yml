services:
  clipr:
    build: .
    container_name: clipr
    ports:
      - "3000:3000"
    volumes:
      - clipr-data:/data
      - .:/repo
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - NODE_ENV=production
      - DATA_DIR=/data
      - OLLAMA_HOST=ollama
      - OLLAMA_PORT=11434
      - JWT_SECRET=***REDACTED***
    deploy:
      resources:
        reservations:
          devices:
            - capabilities: [gpu]
    depends_on:
      ollama:
        condition: service_healthy
    restart: always

  ollama:
    image: ollama/ollama
    container_name: clipr-ollama
    volumes:
      - ollama-data:/root/.ollama
    deploy:
      resources:
        reservations:
          devices:
            - capabilities: [gpu]
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: always

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: clipr-tunnel
    command: tunnel --no-autoupdate --protocol http2 run --token ${CLOUDFLARE_TUNNEL_TOKEN}
    restart: always
    depends_on:
      - clipr

volumes:
  clipr-data:
  ollama-data:
